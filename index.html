<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>XLII J-Card Review</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    color: #e8e0d0;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }

  /* Sticky header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #111;
    border-bottom: 1px solid #333;
    padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    color: #d4a843;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 10px;
  }
  .progress-stats {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
  }
  .progress-bar {
    height: 6px;
    background: #2a2a2a;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #d4a843;
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  /* Status summary */
  .status-summary {
    display: flex;
    gap: 12px;
    font-size: 12px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .status-summary span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .dot-approved { display: inline-block; width: 8px; height: 8px; background: #4a90d9; border-radius: 50%; }
  .dot-flagged { display: inline-block; width: 8px; height: 8px; background: #d4a843; transform: rotate(45deg); }
  .dot-skipped { display: inline-block; width: 8px; height: 8px; background: #666; border: 1px solid #888; border-radius: 50%; }

  /* Filter buttons */
  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 6px 12px;
    border-radius: 16px;
    border: 1px solid #444;
    background: transparent;
    color: #aaa;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-btn.active {
    background: #d4a843;
    color: #111;
    border-color: #d4a843;
    font-weight: 600;
  }
  .filter-btn .count {
    font-size: 11px;
    opacity: 0.7;
    margin-left: 3px;
  }

  /* Collection headers */
  .collection-header {
    padding: 16px 16px 8px;
    font-size: 16px;
    font-weight: 700;
    color: #d4a843;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    border-top: 2px solid #d4a843;
    margin-top: 24px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    scroll-margin-top: 140px;
  }
  .collection-header:first-of-type { border-top: none; }
  .collection-count {
    font-size: 12px;
    color: #666;
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
  }

  /* Card */
  .card {
    margin: 8px 12px;
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
    transition: border-color 0.2s;
  }
  .card.status-approved { border-color: #4a90d9; }
  .card.status-flagged { border-color: #d4a843; }
  .card-hidden { display: none; }

  /* Card image */
  .card-img-wrap {
    width: 100%;
    background: #0a0a0a;
    position: relative;
    cursor: pointer;
  }
  .card-img-wrap img {
    width: 100%;
    display: block;
  }
  .img-expand-hint {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    color: #aaa;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    pointer-events: none;
  }

  /* Card info */
  .card-info {
    padding: 12px 14px;
  }
  .card-date {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 2px;
  }
  .card-venue {
    font-size: 13px;
    color: #999;
    margin-bottom: 10px;
  }

  /* Action buttons */
  .card-actions {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .action-btn {
    flex: 1;
    padding: 10px 4px;
    border-radius: 8px;
    border: 1.5px solid #333;
    background: transparent;
    color: #888;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .action-btn .icon {
    font-size: 16px;
    line-height: 1;
  }

  /* Approved state */
  .action-btn.approve-btn.selected {
    background: #1a2d4a;
    border-color: #4a90d9;
    color: #4a90d9;
  }
  /* Flagged state */
  .action-btn.flag-btn.selected {
    background: #3a2a10;
    border-color: #d4a843;
    color: #d4a843;
  }
  /* Skip state */
  .action-btn.skip-btn.selected {
    background: #2a2a2a;
    border-color: #666;
    color: #999;
  }

  /* Comment field */
  .card-comment {
    position: relative;
  }
  .card-comment textarea {
    width: 100%;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 8px;
    color: #ddd;
    font-size: 14px;
    padding: 10px 12px;
    resize: none;
    min-height: 40px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .card-comment textarea:focus {
    border-color: #d4a843;
  }
  .card-comment textarea::placeholder {
    color: #555;
  }
  .save-indicator {
    position: absolute;
    right: 8px;
    top: 8px;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    background: #d4a843;
    padding: 4px 10px;
    border-radius: 4px;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .save-indicator.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Status badge on card */
  .card-status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .badge-approved {
    background: #1a2d4a;
    color: #4a90d9;
  }
  .badge-flagged {
    background: #3a2a10;
    color: #d4a843;
  }
  .badge-skipped {
    background: #2a2a2a;
    color: #888;
  }

  /* Export / action bar */
  .bottom-bar {
    padding: 16px;
    display: flex;
    gap: 8px;
  }
  .bottom-bar button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-export {
    background: #d4a843;
    color: #111;
  }
  .btn-reset {
    background: #2a2a2a;
    color: #888;
    border: 1px solid #444;
  }

  /* Fullscreen image overlay */
  .overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }
  .overlay.active {
    display: flex;
  }
  .overlay img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .overlay-close {
    position: fixed;
    top: max(12px, env(safe-area-inset-top));
    right: 12px;
    color: #fff;
    font-size: 28px;
    z-index: 1001;
    padding: 8px;
    cursor: pointer;
  }

  /* Jump-to-top button */
  .jump-top {
    position: fixed;
    bottom: max(24px, env(safe-area-inset-bottom, 24px));
    right: 16px;
    width: 44px;
    height: 44px;
    border-radius: 22px;
    background: #d4a843;
    color: #111;
    border: none;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    -webkit-tap-highlight-color: transparent;
  }
  .jump-top.visible {
    display: flex;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: max(80px, calc(env(safe-area-inset-bottom, 24px) + 60px));
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.visible { opacity: 1; }
</style>
</head>

<div class="header">
  <h1>XLII J-Card Review</h1>
  <div class="status-summary" id="statusSummary">
    <span>170 cards — all approved by default</span>
    <span><span class="dot-flagged"></span> <span id="flaggedCount">0</span> flagged</span>
  </div>
  <div class="filters" id="filters">

  </div>
  <div class="filters" id="jumpNav" style="margin-top:6px;">

    <button class="filter-btn jump-btn" onclick="document.getElementById('coll-cornell_and_company').scrollIntoView({behavior:'smooth'})">Cornell (42)</button>
    <button class="filter-btn jump-btn" onclick="document.getElementById('coll-wall_of_sound').scrollIntoView({behavior:'smooth'})">Wall of Sound (37)</button>
    <button class="filter-btn jump-btn" onclick="document.getElementById('coll-new_animal').scrollIntoView({behavior:'smooth'})">New Animal (33)</button>
  </div>
</div>

<div id="cardList"></div>

<div class="bottom-bar">
  <button class="btn-export" onclick="exportReview()">Export Review JSON</button>
  <button class="btn-reset" onclick="resetAll()">Reset All</button>
</div>

<div class="overlay" id="overlay" onclick="closeOverlay()">
  <div class="overlay-close">&#x2715;</div>
  <img id="overlayImg" src="">
</div>

<button class="jump-top" id="jumpTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#x2191;</button>

<div class="toast" id="toast"></div>

// Load saved reviews — localStorage first, then sync with Supabase
function loadReviews() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) reviews = JSON.parse(saved);
  } catch(e) {}
  // Push any existing localStorage data to Supabase, then pull latest
  syncToSupabase().then(() => syncFromSupabase());
}

function saveReviews() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(reviews));
}

// Save a single review to Supabase
async function saveReviewToSupabase(id) {
  const review = reviews[id];
  if (!review) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/xlii_jcard_reviews`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({
        id: id,
        status: review.status || null,
        comment: review.comment || '',
        updated_at: new Date().toISOString()
      })
    });
  } catch(e) { console.error('Supabase save error:', e); }
}

// Push all localStorage reviews to Supabase (initial sync)
async function syncToSupabase() {
  const entries = Object.entries(reviews).filter(([_, r]) => r.status || r.comment);
  if (entries.length === 0) return;
  try {
    const rows = entries.map(([id, r]) => ({
      id, status: r.status || null, comment: r.comment || '', updated_at: new Date().toISOString()
    }));
    await fetch(`${SUPABASE_URL}/rest/v1/xlii_jcard_reviews`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify(rows)
    });
    console.log(`Synced ${rows.length} reviews to Supabase`);
  } catch(e) { console.error('Supabase sync error:', e); }
}

// Pull reviews from Supabase (in case another device wrote them)
async function syncFromSupabase() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/xlii_jcard_reviews?select=*`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const rows = await res.json();
    if (!Array.isArray(rows)) return;
    let changed = false;
    for (const row of rows) {
      if (row.status || row.comment) {
        reviews[row.id] = { status: row.status || null, comment: row.comment || '' };
        changed = true;
      }
    }
    if (changed) {
      saveReviews();
      renderCards();
      updateProgress();
    }
    console.log(`Loaded ${rows.length} reviews from Supabase`);
  } catch(e) { console.error('Supabase load error:', e); }
}

function getReview(id) {
  return reviews[id] || { status: null, comment: '' };
}

function flashSaved(id) {
  const indicator = document.querySelector(`[data-card-id="${id}"] .save-indicator`);
  if (indicator) {
    indicator.classList.remove('visible');
    void indicator.offsetWidth; // force reflow for re-trigger
    indicator.classList.add('visible');
    setTimeout(() => indicator.classList.remove('visible'), 1500);
  }
}

function setStatus(id, status) {
  if (!reviews[id]) reviews[id] = { status: null, comment: '' };
  // Toggle off if same status
  if (reviews[id].status === status) {
    reviews[id].status = null;
  } else {
    reviews[id].status = status;
  }
  saveReviews();
  saveReviewToSupabase(id);
  updateCard(id);
  updateProgress();
  applyFilter();
  flashSaved(id);
}

function setComment(id, comment) {
  if (!reviews[id]) reviews[id] = { status: null, comment: '' };
  reviews[id].comment = comment;
  saveReviews();
  saveReviewToSupabase(id);
  flashSaved(id);
}

function formatDate(dateStr) {
  const [y, m, d] = dateStr.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
}

function renderCards() {
  const container = document.getElementById('cardList');
  let html = '';
  let globalNum = 0;

  for (const coll of COLLECTION_ORDER) {
    const collCards = CARDS.filter(c => c.collection === coll);
    if (collCards.length === 0) continue;

    html += `<div class="collection-header" id="coll-${coll}" data-collection="${coll}">
      <span>${COLLECTION_NAMES[coll]}</span>
      <span class="collection-count">${collCards.length} shows</span>
    </div>`;

    for (const card of collCards) {
      globalNum++;
      const review = getReview(card.id);
      const statusClass = review.status ? 'status-' + review.status : '';
      const location = [card.venue, card.city, card.state].filter(Boolean).join(', ');

      const isFlagged = review.status === 'flagged';
      let badgeHtml = isFlagged ? '<div class="card-status-badge badge-flagged">&#x2717; NEEDS CHANGES</div>' : '';

      html += `<div class="card ${isFlagged ? 'status-flagged' : ''}" data-card-id="${card.id}" data-collection="${card.collection}">
        <div class="card-img-wrap" onclick="openOverlay('${card.filename}')">
          <img src="../www/jcards/${card.filename}" alt="${card.date}" loading="lazy">
          <span class="img-expand-hint">Tap to enlarge</span>
        </div>
        <div class="card-info">
          ${badgeHtml}
          <div class="card-date"><span style="color:#d4a843;font-weight:700;margin-right:6px;">#${globalNum}</span>${formatDate(card.date)}</div>
          <div class="card-venue">${location}</div>
          <div class="card-actions">
            <button class="action-btn flag-btn ${isFlagged ? 'selected' : ''}" onclick="setStatus('${card.id}','flagged')">
              <span class="icon">&#x2717;</span> ${isFlagged ? 'Unflag' : 'Flag Issue'}
            </button>
          </div>
          <div class="card-comment">
            <textarea placeholder="What's wrong with this card..." rows="1" oninput="autoGrow(this); debouncedComment('${card.id}', this.value)">${review.comment || ''}</textarea>
            <span class="save-indicator">Saved</span>
          </div>
        </div>
      </div>`;
    }
  }

  container.innerHTML = html;

  // Auto-grow any textareas with content
  document.querySelectorAll('.card-comment textarea').forEach(ta => {
    if (ta.value) autoGrow(ta);
  });
}

function updateCard(id) {
  const el = document.querySelector(`[data-card-id="${id}"]`);
  if (!el) return;
  const review = getReview(id);

  const isFlagged = review.status === 'flagged';

  // Update card border class
  el.className = el.className.replace(/status-\w+/g, '').trim();
  if (isFlagged) el.classList.add('status-flagged');

  // Update badge
  const info = el.querySelector('.card-info');
  let existingBadge = info.querySelector('.card-status-badge');
  if (existingBadge) existingBadge.remove();

  if (isFlagged) {
    const badge = document.createElement('div');
    badge.className = 'card-status-badge badge-flagged';
    badge.innerHTML = '&#x2717; NEEDS CHANGES';
    info.insertBefore(badge, info.firstChild);
  }

  // Update button
  const flagBtn = el.querySelector('.flag-btn');
  if (flagBtn) {
    flagBtn.classList.toggle('selected', isFlagged);
    flagBtn.innerHTML = `<span class="icon">&#x2717;</span> ${isFlagged ? 'Unflag' : 'Flag Issue'}`;
  }
}

function updateProgress() {
  let flagged = 0;
  for (const card of CARDS) {
    const r = getReview(card.id);
    if (r.status === 'flagged') flagged++;
  }
  document.getElementById('flaggedCount').textContent = flagged;
  document.getElementById('flaggedFilterCount').textContent = flagged;
}

function applyFilter() {
  const cards = document.querySelectorAll('.card');
  const headers = document.querySelectorAll('.collection-header');

  // Track which collections have visible cards
  const visibleCollections = new Set();

  cards.forEach(el => {
    const id = el.dataset.cardId;
    const review = getReview(id);
    let show = false;

    switch(currentFilter) {
      case 'all': show = true; break;
      case 'flagged': show = review.status === 'flagged'; break;
    }

    if (show) {
      el.classList.remove('card-hidden');
      visibleCollections.add(el.dataset.collection);
    } else {
      el.classList.add('card-hidden');
    }
  });

  // Show/hide collection headers
  headers.forEach(h => {
    if (visibleCollections.has(h.dataset.collection)) {
      h.style.display = '';
    } else {
      h.style.display = 'none';
    }
  });
}

// Debounced comment saving
let commentTimers = {};
function debouncedComment(id, value) {
  clearTimeout(commentTimers[id]);
  commentTimers[id] = setTimeout(() => setComment(id, value), 400);
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

// Overlay
function openOverlay(filename) {
  const overlay = document.getElementById('overlay');
  const img = document.getElementById('overlayImg');
  img.src = '../www/jcards/' + filename;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
  document.body.style.overflow = '';
}

// Export
function exportReview() {
  const exportData = {
    exportDate: new Date().toISOString(),
    total: CARDS.length,
    summary: { approved: 0, flagged: 0, skipped: 0, unreviewed: 0 },
    cards: []
  };

  for (const card of CARDS) {
    const review = getReview(card.id);
    const status = review.status || 'unreviewed';
    exportData.summary[status]++;
    if (review.status || review.comment) {
      exportData.cards.push({
        identifier: card.id,
        date: card.date,
        venue: card.venue,
        city: card.city,
        state: card.state,
        collection: card.collectionName,
        status: status,
        comment: review.comment || ''
      });
    }
  }

  const blob = new Blob([JSON.stringify(exportData, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `jcard-review-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Review data exported');
}

function resetAll() {
  if (!confirm('Reset all reviews and comments? This cannot be undone.')) return;
  reviews = {};
  saveReviews();
  renderCards();
  updateProgress();
  applyFilter();
  showToast('All reviews cleared');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 2000);
}

// Filter buttons
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  applyFilter();
});

// Scroll to top button
window.addEventListener('scroll', () => {
  const btn = document.getElementById('jumpTop');
  if (window.scrollY > 600) {
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
});

// Keyboard shortcut: Escape closes overlay
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeOverlay();
});

// Init
loadReviews();
renderCards();
updateProgress();
applyFilter();
</script>
</body>
</html>
